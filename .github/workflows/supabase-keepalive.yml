# Despertador de Supabase.
#
# El plan gratuito de Supabase pausa el proyecto después de ~1 semana sin
# actividad (ya nos pasó una vez y la app quedó muerta hasta restaurarlo a
# mano). Este workflow hace una consulta mínima a la API dos veces por semana
# para que el proyecto nunca quede inactivo.
#
# La clave usada es la "publishable" (pública por diseño — es la misma que va
# dentro de la app), así que no hay secreto que proteger acá.

name: Mantener Supabase despierto

on:
  schedule:
    # Lunes y jueves a las 12:00 UTC (9:00 en Argentina)
    - cron: '0 12 * * 1,4'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Consulta mínima a la API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://prhplqidmqdbkvpcimnf.supabase.co/rest/v1/businesses?select=id&limit=1" \
            -H "apikey: sb_publishable_Z_YSrufE3UMuJkCUh8Q0_g_AQFhIPOQ")
          echo "Respuesta HTTP: $code"
          if [ "$code" != "200" ]; then
            echo "::error::Supabase no respondió 200 — puede estar pausado o caído."
            exit 1
          fi
